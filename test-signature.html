<!DOCTYPE html>
<html>
<head>
  <style>
    .signature-preview-container {
      width: max-content;
      min-width: max-content;
      overflow: visible;
      padding: 10px;
      background: transparent;
      display: inline-block;
    }
    .tpl-modern-vertical {
      width: max-content;
      min-width: max-content;
      padding: 25px;
      background: #ffffff;
      border: 1px solid #f0f0f0;
      display: block;
    }
    .tpl-vertical-name {
      white-space: nowrap;
      width: max-content;
      font-size: 28px;
    }
    .tpl-vertical-specialty {
      white-space: nowrap;
      width: max-content;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class='signature-preview-container'>
    <div class='tpl-modern-vertical'>
      <div class='tpl-vertical-header'>
        <div class='tpl-vertical-name-section'>
          <h2 class='tpl-vertical-name'>Andie Edmond</h2>
          <p class='tpl-vertical-specialty'>OWNER OF BAJOR BOUTIQUE</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
